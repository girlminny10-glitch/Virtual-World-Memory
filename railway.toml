[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["nodejs"]

[build.env]
NODE_ENV = "production"

[start]
cmd = "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && node --enable-source-maps ./artifacts/api-server/dist/index.mjs"

[deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
