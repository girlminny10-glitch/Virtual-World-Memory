kind = "web"
previewPath = "/"
title = "Virtual World 3D"
version = "1.0.0"
id = "artifacts/virtual-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21799

[services.development]
run = "pnpm --filter @workspace/virtual-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/virtual-world", "run", "build" ]
publicDir = "artifacts/virtual-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21799"
BASE_PATH = "/"
